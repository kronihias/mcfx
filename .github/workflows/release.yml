name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      sign:
        description: 'Sign + notarize the build (requires secrets to be configured)'
        type: boolean
        default: true
      tag_name:
        description: 'Tag name to upload artifacts to (leave empty for workflow artifacts only)'
        required: false
        default: ''

permissions:
  contents: write   # required for `gh release upload`

env:
  # URL of the private repository containing the Steinberg VST2 SDK.
  # Configure as a repository variable: Settings -> Secrets and variables ->
  # Actions -> Variables -> New repository variable.
  # Example: git@github.com:kronihias/vstsdk2.4.git
  # The repo must contain  pluginterfaces/vst2.x/aeffectx.h  at its root
  # (matches CMakeLists.txt:95). If left unset, builds will fail because
  # the existing build scripts pass -DBUILD_VST=TRUE which requires the SDK.
  VST2_SDK_REPO: ${{ vars.VST2_SDK_REPO }}

jobs:
  # ============================================================================
  build-macos:
    runs-on: macos-14    # Apple Silicon; cross-compiles arm64 + x86_64 universal
    timeout-minutes: 90
    env:
      # Effective sign flag: always true for release events; honours dispatch
      # input otherwise. Auto-downgraded later if signing secrets are missing.
      SIGN: ${{ (github.event_name == 'release' || inputs.sign) && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        # Init submodules manually below. actions/checkout shallow-clones
        # submodules at --depth=1, which misses our JUCE pin (8.0.13 is a
        # few commits behind upstream's default-branch tip). Its fallback
        # direct-SHA fetch then fails with a credential prompt because the
        # github.com extraheader doesn't propagate to that second fetch.

      - name: Init submodules
        shell: bash
        run: |
          # Full (non-shallow) clone so any pinned-but-not-tip JUCE commit
          # is always reachable. Retry to absorb transient github.com flakes.
          for i in 1 2 3; do
            git submodule update --init --recursive && exit 0
            echo "submodule update failed (attempt $i/3), retrying in 10s..."
            sleep 10
          done
          exit 1

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Verify VST2 SDK configuration
        env:
          VST2_SDK_DEPLOY_KEY: ${{ secrets.VST2_SDK_DEPLOY_KEY }}
        run: |
          if [ -z "$VST2_SDK_REPO" ]; then
            echo "::error::VST2_SDK_REPO repository variable is not set."
            echo "::error::See .github/CODE_SIGNING.md for how to configure the private VST2 SDK repo + deploy key."
            exit 1
          fi
          if [ -z "$VST2_SDK_DEPLOY_KEY" ]; then
            echo "::error::VST2_SDK_DEPLOY_KEY secret is not set."
            echo "::error::See .github/CODE_SIGNING.md for how to configure the private VST2 SDK repo + deploy key."
            exit 1
          fi

      - name: Install Ninja
        run: brew install ninja

      - name: Setup VST2 SDK SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VST2_SDK_DEPLOY_KEY }}

      - name: Clone VST2 SDK
        run: |
          mkdir -p "$HOME/SDKs"
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git clone --depth 1 "$VST2_SDK_REPO" "$HOME/SDKs/vstsdk2.4"
          # Make available to build_osx.sh
          echo "VST2SDKPATH=$HOME/SDKs/vstsdk2.4" >> "$GITHUB_ENV"

      - name: Setup macOS code signing
        if: env.SIGN == 'true'
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          CODESIGN_CERTIFICATE_P12: ${{ secrets.CODESIGN_CERTIFICATE_P12 }}
          CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.CODESIGN_CERTIFICATE_PASSWORD }}
          CODESIGN_APP: ${{ secrets.CODESIGN_APP }}
          CODESIGN_INSTALLER: ${{ secrets.CODESIGN_INSTALLER }}
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
          NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}
        run: |
          if [ -z "$CODESIGN_CERTIFICATE_P12" ]; then
            echo "::warning::Signing requested but CODESIGN_CERTIFICATE_P12 secret is empty - falling back to unsigned build."
            echo "SIGN=false" >> "$GITHUB_ENV"
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CODESIGN_CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -P "$CODESIGN_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm certificate.p12

          cat > scripts/codesign.env <<EOF
          CODESIGN_APP="$CODESIGN_APP"
          CODESIGN_INSTALLER="$CODESIGN_INSTALLER"
          NOTARIZE_APPLE_ID="$NOTARIZE_APPLE_ID"
          NOTARIZE_PASSWORD="$NOTARIZE_PASSWORD"
          NOTARIZE_TEAM_ID="$NOTARIZE_TEAM_ID"
          EOF

      - name: Build VST3 (signed + notarized)
        if: env.SIGN == 'true'
        run: ./scripts/build_osx.sh --vst3

      - name: Build VST3 (unsigned)
        if: env.SIGN != 'true'
        run: ./scripts/build_osx.sh --vst3 --no-sign

      - name: Verify installer exists
        run: |
          PKG="_OSX_RELEASE/mcfx_v${{ steps.version.outputs.version }}_macos_vst3.pkg"
          if [ ! -f "$PKG" ]; then
            echo "::error::Expected installer not found: $PKG"
            ls -la _OSX_RELEASE/ || true
            exit 1
          fi
          ls -lh "$PKG"

      - name: Upload as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: macos-vst3-installer
          path: _OSX_RELEASE/mcfx_v${{ steps.version.outputs.version }}_macos_vst3.pkg
          retention-days: 30

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "_OSX_RELEASE/mcfx_v${{ steps.version.outputs.version }}_macos_vst3.pkg" \
            --clobber

  # ============================================================================
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 90
    env:
      SIGN: ${{ (github.event_name == 'release' || inputs.sign) && 'true' || 'false' }}
      # Override defaults baked into build_all_win64.bat for the GH-hosted runner.
      MSBUILD: '"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe"'
      MAKENSIS: '"C:\Program Files (x86)\NSIS\makensis.exe"'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        # Init submodules manually below. actions/checkout shallow-clones
        # submodules at --depth=1, which misses our JUCE pin (8.0.13 is a
        # few commits behind upstream's default-branch tip). Its fallback
        # direct-SHA fetch then fails with a credential prompt because the
        # github.com extraheader doesn't propagate to that second fetch.

      - name: Init submodules
        shell: bash
        run: |
          # Full (non-shallow) clone so any pinned-but-not-tip JUCE commit
          # is always reachable. Retry to absorb transient github.com flakes.
          for i in 1 2 3; do
            git submodule update --init --recursive && exit 0
            echo "submodule update failed (attempt $i/3), retrying in 10s..."
            sleep 10
          done
          exit 1

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Verify VST2 SDK configuration
        shell: bash
        env:
          VST2_SDK_DEPLOY_KEY: ${{ secrets.VST2_SDK_DEPLOY_KEY }}
        run: |
          if [ -z "$VST2_SDK_REPO" ]; then
            echo "::error::VST2_SDK_REPO repository variable is not set."
            echo "::error::See .github/CODE_SIGNING.md for how to configure the private VST2 SDK repo + deploy key."
            exit 1
          fi
          if [ -z "$VST2_SDK_DEPLOY_KEY" ]; then
            echo "::error::VST2_SDK_DEPLOY_KEY secret is not set."
            echo "::error::See .github/CODE_SIGNING.md for how to configure the private VST2 SDK repo + deploy key."
            exit 1
          fi

      - name: Install NSIS
        shell: pwsh
        run: choco install -y nsis --no-progress

      - name: Setup VST2 SDK SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VST2_SDK_DEPLOY_KEY }}

      - name: Clone VST2 SDK
        shell: bash
        run: |
          mkdir -p "$HOME/SDKs"
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git clone --depth 1 "$VST2_SDK_REPO" "$HOME/SDKs/vstsdk2.4"
          # Convert to native Windows path so cmake on Windows handles it correctly.
          WIN_PATH=$(cygpath -w "$HOME/SDKs/vstsdk2.4")
          echo "VST2SDKPATH=$WIN_PATH" >> "$GITHUB_ENV"

      - name: Setup Windows code signing
        if: env.SIGN == 'true'
        shell: pwsh
        env:
          WINDOWS_CODESIGN_PFX: ${{ secrets.WINDOWS_CODESIGN_PFX }}
          WINDOWS_CODESIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}
          WINDOWS_INSTALLER_PFX: ${{ secrets.WINDOWS_INSTALLER_PFX }}
          WINDOWS_INSTALLER_PFX_PASSWORD: ${{ secrets.WINDOWS_INSTALLER_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_CODESIGN_PFX)) {
            Write-Host "::warning::Signing requested but WINDOWS_CODESIGN_PFX secret is empty - falling back to unsigned build."
            "SIGN=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            exit 0
          }

          # Decode PFX certs into the locations the batch script expects
          # (relative to scripts/ which is the working dir for build_all_win64.bat).
          [IO.File]::WriteAllBytes("scripts\DevIDApplication.p12",
            [Convert]::FromBase64String($env:WINDOWS_CODESIGN_PFX))
          [IO.File]::WriteAllBytes("scripts\DevIDInstaller.p12",
            [Convert]::FromBase64String($env:WINDOWS_INSTALLER_PFX))

          # Expose passwords to the batch via env (it now reads them with
          # `if not defined` so this works without editing the script per-CI).
          "SIGN_PASS=$env:WINDOWS_CODESIGN_PFX_PASSWORD"      | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_PASS=$env:WINDOWS_INSTALLER_PFX_PASSWORD" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create build dir
        shell: cmd
        run: if not exist build mkdir build

      - name: Build VST3 (signed)
        if: env.SIGN == 'true'
        shell: cmd
        working-directory: scripts
        run: build_all_win64.bat vst3 sign

      - name: Build VST3 (unsigned)
        if: env.SIGN != 'true'
        shell: cmd
        working-directory: scripts
        run: build_all_win64.bat vst3

      - name: Verify installer exists
        shell: cmd
        run: |
          set EXE=_WIN_RELEASE\mcfx_v${{ steps.version.outputs.version }}_VST3_win64.exe
          if not exist "%EXE%" (
            echo ::error::Expected installer not found: %EXE%
            dir _WIN_RELEASE 2>nul
            exit /b 1
          )
          dir "%EXE%"

      - name: Upload as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: windows-vst3-installer
          path: _WIN_RELEASE/mcfx_v${{ steps.version.outputs.version }}_VST3_win64.exe
          retention-days: 30

      - name: Upload to release
        if: github.event_name == 'release'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "_WIN_RELEASE/mcfx_v${{ steps.version.outputs.version }}_VST3_win64.exe" \
            --clobber

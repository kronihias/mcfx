name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS
          - os: windows-2022
            name: Windows

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      # vcpkg manifest mode pulls in FFTW3 on Windows (see vcpkg.json). The
      # GH Actions Windows runner has vcpkg preinstalled at
      # VCPKG_INSTALLATION_ROOT; using its built-in GHA binary cache backend
      # means FFTW3 is rebuilt only when the manifest changes.
      - name: Export GitHub Actions cache env (for vcpkg binary cache)
        if: runner.os == 'Windows'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Run test suite
        env:
          VCPKG_BINARY_SOURCES: ${{ runner.os == 'Windows' && 'clear;x-gha,readwrite' || '' }}
        run: python tests/run_tests.py
